<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.cdnfonts.com/css/games" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family:Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #4a00e0, #8e2de2);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        header {
            position: absolute;
            top: 0;
            width: 100%;
            background: #ffffff;
            color: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        header .logo {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            height: 50px;
        }

        header .logo img {
            height: 100%;
            margin-right: 10px;
        }

        header nav {
            display: flex;
            gap: 30px; /* Added more space between nav items */
        }

        header nav a {
            text-decoration: none;
            color: #000000;
            font-size: 1rem;
            font-weight: bold;
        }

        header nav a:hover {
            text-decoration: underline;
        }

        header .login {
            padding: 5px 15px;
            background-color: #6c63ff;
            color: white;
            border-radius: 20px;
            text-decoration: none;
        }

        header .login:hover {
            background-color: #5753c9;
        }

        .container {
            text-align: center;
        }

        .container h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .search-bar {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .search-bar input {
            width: 400px;
            padding: 10px;
            font-size: 1rem;
            border: none;
            border-radius: 5px 0 0 5px;
            outline: none;
        }

        .search-bar button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #6a599d ;
            border: none;
            border-radius: 0 5px 5px 0;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .search-bar button:hover {
            background-color: purple;
        }

        .container h1 {
            font-family:'Games', sans-serif;
        }

        .background-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1; /* Ensure it stays behind other content */
        }


    </style>
